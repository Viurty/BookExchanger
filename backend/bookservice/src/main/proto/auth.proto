syntax = "proto3";

package api;

option go_package = "example.com/api";
option java_package = "com.example.auth";
option java_multiple_files = true;

message User {
  string role = 1;
  string login = 2;
  bool isRegister = 3;
}

message LoginRequest {
  string login = 1;
  string password = 2;
}

service AuthService {
  rpc RegisterUser(LoginRequest) returns (User);
  rpc AuthUser(LoginRequest) returns (User);
}
