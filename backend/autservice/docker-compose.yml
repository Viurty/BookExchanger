version: "3.9"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  auth-service:
    build: .
    ports:
      - "8081:8081"
    depends_on:
      - postgres
    environment:
      PORT: 8081
      DB_USER: myuser
      DB_PASS: mypassword
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: mydb

volumes:
  pgdata:
